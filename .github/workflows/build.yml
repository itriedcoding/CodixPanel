name: Build CodixOS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-i686-linux-gnu nasm grub-pc-bin grub-common xorriso mtools make

      - name: Build kernel
        run: |
          cd codixos
          make CC=i686-linux-gnu-gcc AS=nasm LD=i686-linux-gnu-gcc all

      - name: Create ISO
        run: |
          cd codixos
          ls -la build/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: codixos-iso
          path: codixos/build/codixos-1.0.0.iso
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: codixos/build/codixos-1.0.0.iso
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
